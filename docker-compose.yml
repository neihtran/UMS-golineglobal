# docker-compose.yml
# UMS - University Management System
# Usage: docker compose up -d
#   or:   docker compose -f docker-compose.yml up -d

services:
  # ─── MongoDB Database ─────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ums-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-ums_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-ums_secure_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-ums_db}
    ports:
      - "${MONGO_EXPOSE_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      # - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ums-network

  # ─── Mongo Express (Admin UI) ─────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: ums-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_AUTHUSERNAME: ${MONGO_ROOT_USERNAME:-ums_admin}
      ME_CONFIG_MONGODB_AUTHPASSWORD: ${MONGO_ROOT_PASSWORD:-ums_secure_password}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ums-network
    profiles:
      - dev

  # ─── Backend API Server ──────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ums-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-ums_admin}:${MONGO_ROOT_PASSWORD:-ums_secure_password}@mongodb:27017/${MONGO_DB_NAME:-ums_db}?authSource=admin
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ALLOWED_ORIGINS=${FRONTEND_URL:-http://localhost:5173}
      - TOTP_ISSUER=UMS-University
      - TOTP_SECRET=${TOTP_SECRET:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ums-network
    volumes:
      - uploads_data:/app/uploads

  # ─── Frontend Web App ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ums-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000/api}
      - VITE_APP_NAME=UMS
    depends_on:
      - backend
    networks:
      - ums-network

# ─── Networks ──────────────────────────────────────────────────
networks:
  ums-network:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
